{% extends 'base.html' %}
{% block title %}Login | Trekking Management{% endblock %}
{% block content %}
<div class="auth-shell mx-auto">
  <div class="card shadow-sm border-0">
    <div class="card-body p-4 p-lg-5">
      <h2 class="fw-bold mb-2">Login</h2>
      <p class="text-secondary mb-4">Use your registered email and password to access the dashboard.</p>
      <form method="post" class="row g-3">
        <div class="col-12">
          <label class="form-label">Email or Admin ID</label>
          <input class="form-control form-control-lg" type="text" name="identifier" required>
        </div>
        <div class="col-12">
          <label class="form-label">Password</label>
          <input class="form-control form-control-lg" type="password" name="password" required>
        </div>
        <div class="col-12 d-grid">
          <button class="btn btn-primary btn-lg" type="submit">Login</button>
        </div>
      </form>
      <hr class="my-4">
      <div class="d-flex flex-wrap gap-2">
        <a href="{{ url_for('register', role='user') }}" class="btn btn-outline-secondary">Register Trekker</a>
        <a href="{{ url_for('register', role='staff') }}" class="btn btn-outline-secondary">Register Staff</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
